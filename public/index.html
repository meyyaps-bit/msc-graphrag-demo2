<!DOCTYPE html>
<html>
<head>
  <title>MSc Chatbot</title>
  <style>
    body { font-family: Arial; background: #f5f5f5; padding: 20px; }
    #chat { background: white; padding: 20px; height: 400px; overflow-y: auto; border-radius: 8px; border: 1px solid #ddd; }
    .msg { margin-bottom: 14px; line-height: 1.4; }
    .user { font-weight: bold; color: #0078d4; }
    .bot { font-weight: bold; color: #444; }
    #inputBox { margin-top: 20px; display: flex; }
    #question { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 16px; }
    button { padding: 10px 20px; margin-left: 10px; border: none; background: #0078d4; color: white; border-radius: 6px; cursor: pointer; font-size: 16px; }
    button:hover { background: #005fa3; }
  </style>
</head>
<body>

<h2>MSc Programme Chatbot</h2>

<div id="chat"></div>

<div id="inputBox">
  <input id="question" placeholder="Ask something about the MSc…" />
  <button onclick="send()">Send</button>
</div>

<script>
const API_URL = "/api/chat";

async function send() {
  const q = document.getElementById("question").value.trim();
  if (!q) return;

  addMessage("user", q);
  document.getElementById("question").value = "";

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question: q })
    });

    const data = await res.json();
    addMessage("bot", data.answer || "No response from server.");
  } catch (err) {
    addMessage("bot", "Error contacting server.");
  }
}

function addMessage(sender, text) {
  const chat = document.getElementById("chat");
  chat.innerHTML += `<div class="msg"><span class="${sender}">${sender}:</span> ${text}</div>`;
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
